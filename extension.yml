schema_version: "1.0"

extension:
  id: "orca"
  name: "Orca - Worktree Manager and TUI"
  version: "3.0.0"
  description: "Worktree manager with cross-tool contract layer, cmux integration, and a live awareness TUI. The SDD review pipeline (review-spec, review-code, review-pr) and quality-gate capabilities (cite, gate) are deprecated as of v3.0.0 — see plugins/claude-code/commands/deprecated/."
  author: "SteeZyT33"
  repository: "https://github.com/SteeZyT33/orca"
  license: "MIT"
  homepage: "https://github.com/SteeZyT33/orca"

requires:
  speckit_version: ">=0.5.0"

provides:
  commands:
    - name: "speckit.orca.tui"
      file: "plugins/claude-code/commands/tui.md"
      description: "Live awareness pane showing worktree lanes, review queue, and event feed."

    - name: "speckit.orca.doctor"
      file: "plugins/claude-code/commands/doctor.md"
      description: "Diagnose orca install: orca-cli on PATH, worktree config, SKILL.md presence, reviewer backends. Exit 0 if healthy."

  # Deprecated as of v3.0.0 — kept for opt-in via explicit invocation.
  # The SDD review pipeline was built for cross-team review workflows; for
  # solo use, lean on superpowers (TDD/verification/debugging gates) plus
  # CodeRabbit/CI for code review. See docs/decisions/2026-05-07-lean-skill-bundle.md.
  deprecated_commands:
    - name: "speckit.orca.brainstorm"
      file: "plugins/claude-code/commands/deprecated/brainstorm.md"
      description: "[DEPRECATED] Structured pre-spec ideation. Use superpowers:brainstorming or grill-with-docs instead."

    - name: "speckit.orca.review-spec"
      file: "plugins/claude-code/commands/deprecated/review-spec.md"
      description: "[DEPRECATED] Cross-agent adversarial spec review. Built for cross-team workflows; for solo use rely on the superpowers brainstorming/writing-plans review steps."

    - name: "speckit.orca.review-code"
      file: "plugins/claude-code/commands/deprecated/review-code.md"
      description: "[DEPRECATED] Self+cross review per phase. Use superpowers:requesting-code-review or external CodeRabbit CLI."

    - name: "speckit.orca.review-pr"
      file: "plugins/claude-code/commands/deprecated/review-pr.md"
      description: "[DEPRECATED] PR comment disposition + retro. Use GitHub PR comments + manual retro."

    - name: "speckit.orca.gate"
      file: "plugins/claude-code/commands/deprecated/gate.md"
      description: "[DEPRECATED] SDD completion-gate. CI status checks cover this for solo use."

    - name: "speckit.orca.cite"
      file: "plugins/claude-code/commands/deprecated/cite.md"
      description: "[DEPRECATED] Citation validator. Niche; deprecate unless you publish synthesis content."

  config:
    - name: "orca-config.yml"
      template: "config-template.yml"
      description: "Review and cross-pass routing configuration (relevant only for deprecated review pipeline)"
      required: false

# Auto-trigger hooks for the deprecated review pipeline are removed in v3.0.0.
# To re-enable, copy the prior hook block from git history and reference the
# deprecated/ command paths.

# Companion extensions installed by the bootstrap script.
# These are NOT dependencies; the orca extension works without them.
companions:
  - id: "superb"
    why: "TDD enforcement, superpowers-based verification gates, and debug escalation protocol"

tags:
  - "worktrees"
  - "cmux"
  - "orca"
  - "tui"
